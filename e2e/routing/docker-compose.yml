x-mock-pod-base: &mock-pod-base
  build:
    context: .
    dockerfile: Dockerfile.mock
  working_dir: /app
  volumes:
    - ./mock_pod.py:/app/mock_pod.py:ro

services:
  calinix:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["/etc/calinix/config.yaml"]
    ports:
      - "18080:8080"
    volumes:
      - ./config.yaml:/etc/calinix/config.yaml:ro

  single-1:
    <<: *mock-pod-base
    expose:
      - "8101"
    environment:
      CALINIX_EVENT_URL: http://calinix:8080/events
      SERVICE_NAME: single-1
      POD_ID: "0"
      PORT: "8101"

  single-2:
    <<: *mock-pod-base
    expose:
